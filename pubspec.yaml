name: flutter_
description: "moodscape_app"
publish_to: 'none' # Prevent accidental publishing to pub.dev

version: 1.0.0+1

environment:
  sdk: ^3.10.3

# ---------------------------
# Dependencies
# ---------------------------
dependencies:
  flutter:
    sdk: flutter

  # Cupertino icons for iOS style
  cupertino_icons: ^1.0.8

  # Core MoodScape dependencies
  provider: ^6.1.1
  uuid: ^4.3.3
  intl: ^0.19.0
  google_fonts: ^6.1.0
  flutter_staggered_animations: ^1.0.0 # Premium animations ke liye

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

# ---------------------------
# Flutter specific settings
# ---------------------------
flutter:
  uses-material-design: true

  # Assets section (uncomment and add your assets)
  assets:
    - assets/images/
    - assets/animations/
    - assets/icons/

  # Fonts section (example, add your own fonts here)
  # fonts:
  #   - family: Schyler
  #     fonts:
  #       - asset: fonts/Schyler-Regular.ttf
  #       - asset: fonts/Schyler-Italic.ttf
  #         style: italic
  #   - family: Trajan Pro
  #     fonts:
  #       - asset: fonts/TrajanPro.ttf
  #       - asset: fonts/TrajanPro_Bold.ttf
  #         weight: 700